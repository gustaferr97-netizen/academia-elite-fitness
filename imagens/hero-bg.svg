<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <rect width="1200" height="800" fill="#0a0a0a"/>
  <!-- Background geometric shapes -->
  <polygon points="600,50 1150,400 600,750 50,400" fill="#111" stroke="#f5b800" stroke-width="2" opacity="0.4"/>
  <polygon points="600,150 1050,400 600,650 150,400" fill="#161616" stroke="#f5b800" stroke-width="1" opacity="0.3"/>
  <!-- Silhouette of person lifting weights -->
  <!-- Body -->
  <ellipse cx="600" cy="280" rx="35" ry="40" fill="#f5b800"/>
  <!-- Head -->
  <circle cx="600" cy="220" r="30" fill="#f5b800"/>
  <!-- Arms extended holding barbell -->
  <rect x="380" y="265" width="480" height="18" rx="9" fill="#ffffff"/>
  <!-- Weight plates left -->
  <rect x="370" y="240" width="25" height="68" rx="5" fill="#f5b800" stroke="#ffffff" stroke-width="2"/>
  <rect x="340" y="248" width="35" height="52" rx="5" fill="#f5b800" stroke="#ffffff" stroke-width="2"/>
  <!-- Weight plates right -->
  <rect x="865" y="240" width="25" height="68" rx="5" fill="#f5b800" stroke="#ffffff" stroke-width="2"/>
  <rect x="885" y="248" width="35" height="52" rx="5" fill="#f5b800" stroke="#ffffff" stroke-width="2"/>
  <!-- Arms -->
  <line x1="565" y1="280" x2="405" y2="274" stroke="#f5b800" stroke-width="14" stroke-linecap="round"/>
  <line x1="635" y1="280" x2="795" y2="274" stroke="#f5b800" stroke-width="14" stroke-linecap="round"/>
  <!-- Legs -->
  <line x1="585" y1="320" x2="560" y2="430" stroke="#f5b800" stroke-width="16" stroke-linecap="round"/>
  <line x1="615" y1="320" x2="640" y2="430" stroke="#f5b800" stroke-width="16" stroke-linecap="round"/>
  <!-- Feet -->
  <ellipse cx="555" cy="440" rx="22" ry="10" fill="#ffffff"/>
  <ellipse cx="645" cy="440" rx="22" ry="10" fill="#ffffff"/>
  <!-- Text POWERFIT -->
  <text x="600" y="560" font-family="Arial Black, Arial" font-size="80" font-weight="900" fill="#f5b800" text-anchor="middle" letter-spacing="-2">POWER<tspan fill="#ffffff">FIT</tspan></text>
  <text x="600" y="610" font-family="Arial, sans-serif" font-size="22" fill="#b3b3b3" text-anchor="middle" letter-spacing="8">SINTA A FORÇA</text>
  <!-- Decorative lines -->
  <line x1="100" y1="630" x2="450" y2="630" stroke="#f5b800" stroke-width="2"/>
  <line x1="750" y1="630" x2="1100" y2="630" stroke="#f5b800" stroke-width="2"/>
</svg>
