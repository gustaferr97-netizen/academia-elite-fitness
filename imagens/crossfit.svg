  <line x1="550" y1="50" x2="50" y2="350" stroke="#161616" stroke-width="80"/>
  <!-- Kettlebell -->
  <circle cx="200" cy="180" r="55" fill="none" stroke="#f5b800" stroke-width="8"/>
  <rect x="178" y="108" width="44" height="28" rx="8" fill="none" stroke="#f5b800" stroke-width="8"/>
  <rect x="168" y="230" width="64" height="18" rx="4" fill="#f5b800"/>
  <!-- Jump rope person -->
  <circle cx="400" cy="155" r="25" fill="#ffffff"/>
