  <line x1="400" y1="205" x2="370" y2="230" stroke="#ffffff" stroke-width="10" stroke-linecap="round"/>
  <line x1="400" y1="205" x2="430" y2="230" stroke="#ffffff" stroke-width="10" stroke-linecap="round"/>
