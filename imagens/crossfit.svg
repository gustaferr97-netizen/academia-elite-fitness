  <line x1="400" y1="250" x2="425" y2="280" stroke="#ffffff" stroke-width="10" stroke-linecap="round"/>
  <!-- Jump rope -->
  <path d="M370 230 Q300 310 370 290 Q440 270 430 230" fill="none" stroke="#f5b800" stroke-width="3"/>
  <!-- Label -->
  <text x="300" y="345" font-family="Arial Black" font-size="26" font-weight="900" fill="#f5b800" text-anchor="middle" letter-spacing="3">ARENA CROSS</text>
  <line x1="80" y1="360" x2="520" y2="360" stroke="#f5b800" stroke-width="1" opacity="0.4"/>
