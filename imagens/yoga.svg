<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#0a0a0a"/>
  <!-- Decorative circles (zen) -->
  <circle cx="300" cy="200" r="160" fill="none" stroke="#f5b800" stroke-width="1" opacity="0.2"/>
  <circle cx="300" cy="200" r="130" fill="none" stroke="#f5b800" stroke-width="1" opacity="0.15"/>
  <circle cx="300" cy="200" r="100" fill="none" stroke="#f5b800" stroke-width="1" opacity="0.1"/>
  <!-- Yoga mat -->
  <rect x="130" y="295" width="340" height="18" rx="9" fill="#161616" stroke="#f5b800" stroke-width="2"/>
  <!-- Person in lotus pose -->
  <!-- Body -->
  <ellipse cx="300" cy="255" rx="30" ry="35" fill="#f5b800"/>
  <!-- Head -->
  <circle cx="300" cy="200" r="28" fill="#f5b800"/>
  <!-- Arms raised (V shape) -->
  <line x1="285" y1="240" x2="220" y2="185" stroke="#f5b800" stroke-width="12" stroke-linecap="round"/>
  <line x1="315" y1="240" x2="380" y2="185" stroke="#f5b800" stroke-width="12" stroke-linecap="round"/>
  <!-- Hands open -->
  <circle cx="218" cy="183" r="10" fill="#ffffff"/>
  <circle cx="382" cy="183" r="10" fill="#ffffff"/>
  <!-- Crossed legs (lotus) -->
  <path d="M270 285 Q230 310 200 295 Q220 275 260 278" fill="#f5b800"/>
  <path d="M330 285 Q370 310 400 295 Q380 275 340 278" fill="#f5b800"/>
  <!-- Feet -->
  <ellipse cx="195" cy="296" rx="18" ry="9" fill="#ffffff"/>
  <ellipse cx="405" cy="296" rx="18" ry="9" fill="#ffffff"/>
  <!-- Aura/glow lines -->
  <line x1="300" y1="155" x2="300" y2="135" stroke="#f5b800" stroke-width="2" opacity="0.5"/>
  <line x1="320" y1="160" x2="335" y2="143" stroke="#f5b800" stroke-width="2" opacity="0.4"/>
  <line x1="280" y1="160" x2="265" y2="143" stroke="#f5b800" stroke-width="2" opacity="0.4"/>
  <!-- Label -->
  <text x="300" y="360" font-family="Arial Black" font-size="28" font-weight="900" fill="#f5b800" text-anchor="middle" letter-spacing="3">STUDIO YOGA</text>
  <line x1="80" y1="375" x2="520" y2="375" stroke="#f5b800" stroke-width="1" opacity="0.4"/>
</svg>
