  <circle cx="58" cy="56" r="2" fill="#ffffff" opacity="0.6"/>
  <circle cx="64" cy="56" r="2" fill="#ffffff" opacity="0.6"/>
  <circle cx="70" cy="56" r="2" fill="#ffffff" opacity="0.6"/>
  <circle cx="78" cy="56" r="2" fill="#ffffff" opacity="0.6"/>
  <circle cx="84" cy="56" r="2" fill="#ffffff" opacity="0.6"/>
  <circle cx="90" cy="56" r="2" fill="#ffffff" opacity="0.6"/>
  <circle cx="96" cy="56" r="2" fill="#ffffff" opacity="0.6"/>
  <text x="60" y="74" font-family="Arial" font-size="8" fill="#b3b3b3" text-anchor="middle" letter-spacing="1">CRÉDITO</text>
</svg>
