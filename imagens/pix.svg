<svg xmlns="http://www.w3.org/2000/svg" width="120" height="80" viewBox="0 0 120 80">
  <rect width="120" height="80" rx="10" fill="#161616" stroke="#f5b800" stroke-width="1.5"/>
  <!-- Pix logo shape (4 diamond blades) -->
  <g transform="translate(60,38)">
    <rect x="-10" y="-10" width="20" height="20" rx="3" fill="#f5b800" transform="rotate(45)"/>
    <rect x="-10" y="-10" width="20" height="20" rx="3" fill="#0a0a0a" transform="rotate(45)" opacity="0.5"/>
    <!-- top blade -->
    <path d="M-6,-6 L0,-18 L6,-6 Z" fill="#f5b800"/>
    <!-- bottom blade -->
    <path d="M-6,6 L0,18 L6,6 Z" fill="#f5b800"/>
    <!-- left blade -->
    <path d="M-6,-6 L-18,0 L-6,6 Z" fill="#f5b800"/>
    <!-- right blade -->
    <path d="M6,-6 L18,0 L6,6 Z" fill="#f5b800"/>
    <!-- center -->
    <rect x="-6" y="-6" width="12" height="12" rx="2" fill="#f5b800" transform="rotate(45)"/>
  </g>
  <text x="60" y="68" font-family="Arial Black" font-size="11" font-weight="900" fill="#f5b800" text-anchor="middle" letter-spacing="2">PIX</text>
</svg>
