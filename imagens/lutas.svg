<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#0a0a0a"/>
  <!-- Octagon ring background -->
  <polygon points="300,30 480,100 540,280 460,370 140,370 60,280 120,100" fill="#111" stroke="#f5b800" stroke-width="3"/>
  <polygon points="300,60 460,120 510,275 440,350 160,350 90,275 140,120" fill="#161616" stroke="#333" stroke-width="1"/>
  <!-- Fighter 1 (left) - punch stance -->
  <circle cx="220" cy="160" r="22" fill="#f5b800"/>
  <line x1="220" y1="182" x2="220" y2="250" stroke="#f5b800" stroke-width="12" stroke-linecap="round"/>
  <!-- Punch arm extended -->
  <line x1="220" y1="205" x2="290" y2="195" stroke="#f5b800" stroke-width="10" stroke-linecap="round"/>
  <circle cx="295" cy="193" r="10" fill="#f5b800"/>
  <!-- Back arm guard -->
  <line x1="220" y1="205" x2="195" y2="225" stroke="#f5b800" stroke-width="10" stroke-linecap="round"/>
  <line x1="220" y1="250" x2="200" y2="300" stroke="#f5b800" stroke-width="10" stroke-linecap="round"/>
  <line x1="220" y1="250" x2="245" y2="295" stroke="#f5b800" stroke-width="10" stroke-linecap="round"/>
  <!-- Fighter 2 (right) - defensive stance -->
  <circle cx="380" cy="160" r="22" fill="#ffffff"/>
  <line x1="380" y1="182" x2="380" y2="250" stroke="#ffffff" stroke-width="12" stroke-linecap="round"/>
  <!-- Guard arms -->
  <line x1="380" y1="205" x2="310" y2="200" stroke="#ffffff" stroke-width="10" stroke-linecap="round"/>
  <circle cx="305" cy="199" r="10" fill="#ffffff"/>
  <line x1="380" y1="205" x2="405" y2="220" stroke="#ffffff" stroke-width="10" stroke-linecap="round"/>
  <line x1="380" y1="250" x2="355" y2="300" stroke="#ffffff" stroke-width="10" stroke-linecap="round"/>
  <line x1="380" y1="250" x2="405" y2="295" stroke="#ffffff" stroke-width="10" stroke-linecap="round"/>
  <!-- Impact lines -->
  <line x1="295" y1="193" x2="305" y2="199" stroke="#f5b800" stroke-width="3" opacity="0.8"/>
  <line x1="285" y1="175" x2="275" y2="165" stroke="#f5b800" stroke-width="2" opacity="0.6"/>
  <line x1="310" y1="170" x2="320" y2="158" stroke="#f5b800" stroke-width="2" opacity="0.6"/>
  <line x1="290" y1="185" x2="278" y2="188" stroke="#f5b800" stroke-width="2" opacity="0.6"/>
  <!-- Label -->
  <text x="300" y="390" font-family="Arial Black" font-size="26" font-weight="900" fill="#f5b800" text-anchor="middle" letter-spacing="3">SALA DE LUTAS</text>
</svg>
