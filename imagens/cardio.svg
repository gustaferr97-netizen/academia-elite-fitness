<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#0a0a0a"/>
  <!-- Treadmill base -->
  <rect x="80" y="280" width="440" height="20" rx="5" fill="#161616" stroke="#f5b800" stroke-width="2"/>
  <rect x="100" y="300" width="400" height="12" rx="3" fill="#222"/>
  <!-- Treadmill belt -->
  <rect x="100" y="268" width="400" height="18" rx="4" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <line x1="150" y1="268" x2="150" y2="286" stroke="#f5b800" stroke-width="1" opacity="0.5"/>
  <line x1="200" y1="268" x2="200" y2="286" stroke="#f5b800" stroke-width="1" opacity="0.5"/>
  <line x1="250" y1="268" x2="250" y2="286" stroke="#f5b800" stroke-width="1" opacity="0.5"/>
  <line x1="300" y1="268" x2="300" y2="286" stroke="#f5b800" stroke-width="1" opacity="0.5"/>
  <line x1="350" y1="268" x2="350" y2="286" stroke="#f5b800" stroke-width="1" opacity="0.5"/>
  <line x1="400" y1="268" x2="400" y2="286" stroke="#f5b800" stroke-width="1" opacity="0.5"/>
  <line x1="450" y1="268" x2="450" y2="286" stroke="#f5b800" stroke-width="1" opacity="0.5"/>
  <!-- Handles -->
  <rect x="155" y="160" width="12" height="115" rx="6" fill="#f5b800"/>
  <rect x="433" y="160" width="12" height="115" rx="6" fill="#f5b800"/>
  <rect x="155" y="155" width="290" height="12" rx="6" fill="#f5b800"/>
  <!-- Screen -->
  <rect x="240" y="130" width="120" height="70" rx="8" fill="#161616" stroke="#f5b800" stroke-width="2"/>
  <text x="300" y="158" font-family="Arial" font-size="11" fill="#f5b800" text-anchor="middle">VELOCIDADE</text>
  <text x="300" y="182" font-family="Arial Black" font-size="24" fill="#ffffff" text-anchor="middle">12.5</text>
  <text x="300" y="196" font-family="Arial" font-size="9" fill="#b3b3b3" text-anchor="middle">km/h</text>
  <!-- Running person silhouette -->
  <circle cx="310" cy="195" r="22" fill="#f5b800"/>
  <line x1="310" y1="217" x2="310" y2="260" stroke="#f5b800" stroke-width="12" stroke-linecap="round"/>
  <line x1="310" y1="230" x2="280" y2="215" stroke="#f5b800" stroke-width="10" stroke-linecap="round"/>
  <line x1="310" y1="230" x2="340" y2="248" stroke="#f5b800" stroke-width="10" stroke-linecap="round"/>
  <line x1="310" y1="260" x2="285" y2="268" stroke="#f5b800" stroke-width="10" stroke-linecap="round"/>
  <line x1="310" y1="260" x2="338" y2="255" stroke="#f5b800" stroke-width="10" stroke-linecap="round"/>
  <!-- Label -->
  <text x="300" y="360" font-family="Arial Black" font-size="28" font-weight="900" fill="#f5b800" text-anchor="middle" letter-spacing="3">CARDIO</text>
  <line x1="80" y1="375" x2="520" y2="375" stroke="#f5b800" stroke-width="1" opacity="0.4"/>
</svg>
